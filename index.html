
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieTracker-01</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>MovieTracker-01</h1>
    </header>
    <main>
        <section id="add-movie-form">
            <h2>Add New Movie</h2>
            <!-- Add movie form will go here -->
        </section>
        <section id="movie-lists">
            <nav>
                <button id="all-movies">All Movies</button>
                <button id="watched-movies">Watched</button>
                <button id="to-watch-movies">To Watch</button>
            </nav>
            <div id="movie-list-container">
                <!-- Movie list will be dynamically populated here -->
            </div>
        </section>
        <section id="search-filter">
            <h2>Search and Filter</h2>
            <!-- Search and filter options will go here -->
        </section>
    </main>
    <script src="app.js"></script>
</body>
</html>


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieTracker-01</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>MovieTracker-01</h1>
    </header>
    <main>
        <section id="add-movie">
            <h2>Add Movie</h2>
            <form id="add-movie-form">
                <input type="text" id="title" placeholder="Title" required>
                <input type="number" id="year" placeholder="Release Year" required>
                <input type="text" id="genre" placeholder="Genre" required>
                <button type="submit">Add Movie</button>
            </form>
        </section>
        <section id="movie-list">
            <h2>Movie List</h2>
            <div id="list-controls">
                <div id="view-tabs">
                    <button class="tab active" data-view="all">All</button>
                    <button class="tab" data-view="watched">Watched</button>
                    <button class="tab" data-view="to-watch">To Watch</button>
                </div>
                <div id="search-filter">
                    <input type="text" id="search" placeholder="Search by title">
                    <select id="filter-genre">
                        <option value="">All Genres</option>
                    </select>
                    <select id="filter-year">
                        <option value="">All Years</option>
                    </select>
                    <select id="filter-rating">
                        <option value="">All Ratings</option>
                    </select>
                </div>
            </div>
            <ul id="movies"></ul>
        </section>
    </main>
    <script src="app.js"></script>
</body>
</html>
